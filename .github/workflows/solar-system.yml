name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/**'
env:
    MONGO_URI: "mongodb+srv://supercluster.d83jj.mongodb.net/superData"
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}



jobs:
    unit-testing:
        name: Unit Testing
        strategy:
          matrix:
            node_version: [18,20]
            os: [ubuntu-latest,macos-latest]
        runs-on: ${{ matrix.os }}
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup NodeJS Version # need to install this as we are using npm
          uses: actions/setup-node@v4  # action to install node
          with:
            node-version: ${{matrix.node_version }}
        - name: Cache NPM dependenices
          uses: actions/cache@v4
          with:
            path: node_modules
            key:  ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json')}}
            # when the  package-lock.json file changed, it will modify the hash value there by creating 
            # a new key for new cache

    
        - name: Install Dependencies
          run: npm install
    
        - name: Unit Testing
          id: unit-testing-step #can be used to track the outcome for next step using steps context
          run: npm test
          
        - name: Archive Test Result
          # ${{ steps.unit-testing-step.outcome =='failure' || steps.unit-testing-step.outcome == 'success' }}
          if: ${{ failure() || success() }}   # always()
          uses: actions/upload-artifact@v4
          with:
            name: Mocha-Test-Result # name to the artifact zip file name
            path: test-results.xml  #locaton to the artifact - actual file 

    code-coverage:
      name: Code Coverage
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
        
        - name: Setup NodeJS Version
          uses: actions/setup-node@v4
          with:
            node-version: 18
        - name: Cache NPM dependenices
          uses: actions/cache@v4
          with:
            path: node_modules
            key:  ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json')}}
        - name: Install Dependencies
          run: npm install

        - name: Check code Coverage
          continue-on-error: true
          run: npm run coverage
        
        - name: Archive Test Result
          uses: actions/upload-artifact@v4
          with:
            name: Code-Coverage_Result # name to the artifact zip file name
            path: coverage
            retention-days: 5
  
    docker:
      name: Containerization
      needs: [unit-testing,code-coverage]
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Dockerhub login
          uses: docker/login-action@v2.2.0
          with:
            username: ${{ vars.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_PASSWORD }}

        
